version: "1.0"

profile:
  name: qodana.recommended

exclude:
  - name: All
    paths:
      - zitadel_client/api
      - zitadel_client/models
      # Test code legitimately uses fixture/helper classes without __init__,
      # descriptive non-PEP8 method names, and reaches into protected members
      # to assert internals. Those IDE inspections are not meaningful on tests.
      - test
      - spec
      - conftest.py
  # IntelliJ-only structural nags that ruff/mypy (the SDK's actual linters) do
  # not flag and that are valid on generated code:
  #  - utility/config classes (HeaderSelector, ValueSerializer, Configuration,
  #    TransportOptions, ApiResponse, ...) intentionally have no __init__.
  - name: PyClassHasNoInitInspection
  #  - helper methods that do not reference self are fine; making them
  #    @staticmethod is a style preference, not a correctness fix.
  - name: PyMethodMayBeStaticInspection
  #  - HttpAwareAuthenticator is an intentional intermediate abstract base whose
  #    concrete subclasses implement the abstract methods.
  - name: PyAbstractClassInspection
  #  - some generated method parameters are part of the uniform public signature
  #    contract even when a given serialization path does not read them.
  - name: PyUnusedLocalInspection
  #  - cross-method structural duplication is inherent to generated code.
  - name: DuplicatedCode
  # Qodana's type-hint inspection misreports valid generic code: it rejects
  # `Generic[T]` / `cast(Optional[T], ...)` where `T` is a module-level
  # TypeVar (api_result.py, oauth_authenticator.py, object_serializer.py).
  # These are correct, mypy-clean type hints, so the reports are false
  # positives.
  - name: PyTypeHintsInspection
  # "Password in URL" fires on a documentation comment that spells out a
  # `http://user:pass@host` example to explain urllib3 proxy-auth behaviour
  # (default_api_client.py). It is not a real credential.
  - name: HardcodedPasswords
  # Qodana 2026.1's unused-imports inspection misflags the optional-dependency
  # idiom in default_api_client.py: `brotli`/`zstandard` are imported inside a
  # `try/except ImportError` and captured into module-level `_brotli`/`_zstandard`
  # sentinels (pre-initialised to None above the try). The inspection demands the
  # name also be bound in the except branch, which is unnecessary here. The
  # imports are used, so the report is a false positive.
  - name: PyUnusedImportsInspection
    paths:
      - zitadel_client/default_api_client.py
  # Code coverage is not a metric we gate on, and the bulk of the SDK is
  # generated code that is untested by design. Qodana does not support
  # path-scoped coverage exclusion (only full-inspection / .NET attribute
  # excludes), so the coverage inspection is disabled outright.
  - name: PyCoverageInspection

linter: jetbrains/qodana-python:2026.1
